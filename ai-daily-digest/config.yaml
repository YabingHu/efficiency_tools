# LLM 每日早报生成器配置
timezone: Asia/Shanghai
output_dir: output
collection_workers: 6

http:
  connect_timeout_seconds: 5
  read_timeout_seconds: 30
  retries: 2

llm:
  base_url: https://llm-sd31i4a7ip2ecfyq.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  model: deepseek-v4-flash
  batch_size: 12        # 每次调用摘要的条目数
  max_retries: 2
  temperature: 0.3
  timeout_seconds: 60
  max_output_tokens: 4096
  # API key 放在 .env 文件的 LLM_API_KEY 中，不要写在这里

# 早报板块（按此顺序渲染），limit 为每个板块最终保留条数
sections:
  papers:
    enabled: true
    title: "📄 今日论文精选"
    subtitle: "HuggingFace Daily Papers 社区高赞"
    limit: 8
  arxiv:
    enabled: true
    title: "🔬 arXiv 新论文"
    subtitle: "cs.CL / cs.AI / cs.LG 最新提交"
    limit: 6
  github:
    enabled: true
    title: "🔥 GitHub 热榜"
    subtitle: "今日 Trending 中的 AI 项目"
    limit: 8
  industry:
    enabled: true
    title: "🏢 业界动态"
    subtitle: "OpenAI / Google / DeepMind / HuggingFace 官方博客"
    limit: 8
  media:
    enabled: true
    title: "📰 行业媒体"
    subtitle: "新智元 · 量子位 · 机器之心"
    limit: 6
  community:
    enabled: true
    title: "💬 社区热议"
    subtitle: "Hacker News · Lobsters · GenAI / AI Stack Exchange"
    limit: 6
    max_per_source: 2  # 来源充足时单一社区最多占两席，不足时自动补满

sources:
  hf_papers:
    max_fetch: 16          # 抓取数量（最终由 limit 截断）
  arxiv:
    categories: [cs.CL, cs.AI, cs.LG]
    max_results: 50
    lookback_hours: 36
    max_staleness_hours: 120
    read_timeout_seconds: 15
    retries: 0  # arXiv 易触发 429；失败时由其他论文源降级兜底
    keywords: [llm, large language model, language model, gpt, transformer,
               agent, reasoning, rlhf, instruction, multimodal, diffusion,
               fine-tun, retrieval, rag, benchmark, alignment, distillation,
               quantization, mixture-of-experts, moe, chain-of-thought]
  github:
    keywords: [llm, gpt, ai, agent, rag, model, transformer, chat, claude,
               deepseek, gemini, qwen, inference, embedding, diffusion,
               neural, machine learning, ml, copilot, assistant]
    max_fetch: 15
  rss:
    lookback_hours: 48
    max_staleness_hours: 96  # 超过该时长未更新的源不再冒充“今日资讯”
    max_items_per_feed: 20
    workers: 6
    feeds:
      # section 决定该 feed 归入哪个板块（默认 industry），需与上面 sections 的 key 对应
      - name: OpenAI Blog
        url: https://openai.com/news/rss.xml
        section: industry
      - name: Google AI Blog
        url: https://blog.google/technology/ai/rss/
        section: industry
      - name: DeepMind Blog
        url: https://deepmind.google/blog/rss.xml
        section: industry
      - name: HuggingFace Blog
        url: https://huggingface.co/blog/feed.xml
        section: industry
      - name: Anthropic Blog
        # Anthropic 官方无 RSS，用社区维护的镜像（每日自动更新，如失效需换源）
        url: https://tim-hilde.github.io/anthropic-rss/rss.xml
        section: industry
      - name: NVIDIA AI Blog
        url: https://blogs.nvidia.com/feed/
        section: industry
      - name: 量子位
        url: https://www.qbitai.com/category/%e8%b5%84%e8%ae%af/feed
        section: media
      - name: 新智元
        url: https://link.baai.ac.cn/@AI_era.rss
        section: media
      - name: 机器之心
        url: http://plink.anyfeeder.com/weixin/almosthuman2014
        section: media
      # 可自行追加更多 RSS 源，格式: {name: 名称, url: 地址, section: industry|media}
  hackernews:
    queries: ["LLM", "GPT", "Claude", "DeepSeek", "open source model"]
    min_points: 40
    lookback_hours: 30
    workers: 5
  community_sources:
    lookback_hours: 96
    lobsters:
      enabled: true
      url: https://lobste.rs/t/ai.json
      max_fetch: 25
      min_score: 5
      min_comments: 2
    stackexchange:
      enabled: true
      max_fetch_per_site: 20
      sites:
        - {site: genai, name: GenAI Stack Exchange}
        - {site: ai, name: AI Stack Exchange}
