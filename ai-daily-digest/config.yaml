# LLM 每日早报生成器配置
timezone: Asia/Shanghai
output_dir: output
collection_workers: 6
initial_visible_items: 4  # 每个板块默认显示条数，其余内容可展开

# 跨天去重：同一条资讯连续几天被采集到时，只在第一次展示，窗口期内不再重复。
# 单次运行内的去重始终生效；此处仅控制跨天窗口。台账存于 history/seen-items.json。
dedup:
  enabled: true
  window_days: 7  # 已展示过的条目在这么多天内不再重复出现

http:
  connect_timeout_seconds: 5
  read_timeout_seconds: 30
  retries: 2

llm:
  base_url: https://llm-sd31i4a7ip2ecfyq.cn-beijing.maas.aliyuncs.com/compatible-mode/v1
  model: deepseek-v4-flash
  batch_size: 6         # 控制单次输出长度，避免模型截断 JSON
  max_retries: 2
  temperature: 0.3
  timeout_seconds: 60
  max_output_tokens: 4096
  max_input_chars_per_item: 2400  # 单条正文送入摘要的最大字符数
  cache_retention_days: 30        # 相同文章和内容在此周期内复用摘要
  # API key 放在 .env 文件的 LLM_API_KEY 中，不要写在这里

# 早报板块（按此顺序渲染），limit 为每个板块最终保留条数
sections:
  papers:
    enabled: true
    title: "📄 今日论文精选"
    subtitle: "HuggingFace Daily Papers 社区高赞"
    limit: 8
  arxiv:
    enabled: true
    title: "🔬 arXiv 新论文"
    subtitle: "cs.CL / cs.AI / cs.LG 最新提交"
    limit: 6
  eval:
    enabled: true
    title: "🧪 大模型测评"
    subtitle: "Benchmark · 评测集 · Leaderboard · LLM-as-a-judge"
    limit: 6
  github:
    enabled: true
    title: "🔥 GitHub 热榜"
    subtitle: "今日 Trending 中的 AI 项目"
    limit: 8
  industry:
    enabled: true
    title: "🏢 业界动态"
    subtitle: "OpenAI · Anthropic · Google · Qwen · DeepSeek · Kimi 等官方动态"
    limit: 8
    max_per_source: 2  # 避免单一厂商更新密集时占满整个板块
  media:
    enabled: true
    title: "📰 行业媒体"
    subtitle: "新智元 · 量子位 · 机器之心"
    limit: 6
  community:
    enabled: true
    title: "🌍 海外社区热议"
    subtitle: "Reddit · X · YouTube · Bluesky · Hacker News · Lobsters · Stack Exchange"
    limit: 8
    max_per_source: 2  # 来源充足时单一社区最多占两席，不足时自动补满
  community_cn:
    enabled: true
    title: "🇨🇳 中文社区热议"
    subtitle: "微博 · B站 · 知乎 · 百度 · 今日头条"
    limit: 6
    max_per_source: 2

# 论文专题分流：标题命中关键词的 arXiv 论文归入专属板块（section 需对应 sections key）。
# 关键词只匹配标题（摘要里 benchmark/evaluation 太泛滥，匹配摘要会误判半数论文）。
# 采集端会自动把这里的关键词并入 arXiv 抓取过滤，无需重复写进 sources.arxiv.keywords。
# 按顺序匹配，首个命中的专题胜出。加新主题只需在此追加一段 + 在 sections 里加对应板块。
paper_topics:
  - section: eval
    keywords:
      - benchmark
      - benchmarking
      - leaderboard
      - evaluation
      - evaluating
      - evaluate
      - assessing
      - llm-as-a-judge
      - chatbot arena
      - mmlu
      - gsm8k
      - big-bench
      - bigbench
      - can llms
      - do llms
      - how well

sources:
  hf_papers:
    max_fetch: 16          # 抓取数量（最终由 limit 截断）
  arxiv:
    categories: [cs.CL, cs.AI, cs.LG]
    max_results: 50
    lookback_hours: 36
    max_staleness_hours: 120
    read_timeout_seconds: 15
    # arXiv 对云端 IP 限流激进。少量重试兜住瞬时 429，真正的兜底是 rss.arxiv.org
    # CDN 通道（见 collectors/arxiv_papers.py），避免整个板块静默变空。
    retries: 2
    keywords: [llm, large language model, language model, gpt, transformer,
               agent, reasoning, rlhf, instruction, multimodal, diffusion,
               fine-tun, retrieval, rag, benchmark, alignment, distillation,
               quantization, mixture-of-experts, moe, chain-of-thought]
  github:
    keywords: [llm, gpt, ai, agent, rag, model, transformer, chat, claude,
               deepseek, gemini, qwen, inference, embedding, diffusion,
               neural, machine learning, ml, copilot, assistant]
    max_fetch: 15
  rss:
    lookback_hours: 48
    max_staleness_hours: 96  # 超过该时长未更新的源不再冒充“今日资讯”
    max_items_per_feed: 20
    workers: 6
    feeds:
      # section 决定该 feed 归入哪个板块（默认 industry），需与上面 sections 的 key 对应
      - name: OpenAI Blog
        url: https://openai.com/news/rss.xml
        section: industry
      - name: Google AI Blog
        url: https://blog.google/technology/ai/rss/
        section: industry
      - name: DeepMind Blog
        url: https://deepmind.google/blog/rss.xml
        section: industry
      - name: HuggingFace Blog
        url: https://huggingface.co/blog/feed.xml
        section: industry
      - name: NVIDIA AI Blog
        url: https://blogs.nvidia.com/feed/
        section: industry
      - name: 量子位
        url: https://www.qbitai.com/category/%e8%b5%84%e8%ae%af/feed
        section: media
      - name: 新智元
        url: https://link.baai.ac.cn/@AI_era.rss
        section: media
      - name: 机器之心
        url: http://plink.anyfeeder.com/weixin/almosthuman2014
        section: media
      # 可自行追加更多 RSS 源，格式: {name: 名称, url: 地址, section: industry|media}
  hackernews:
    queries: ["LLM", "GPT", "Claude", "DeepSeek", "open source model"]
    min_points: 40
    lookback_hours: 30
    workers: 5
    content_fetch_limit: 8  # 只为最高热度的外链抓正文，控制运行时间
    min_content_chars: 160
    require_content: true   # 正文无法获得时不展示，避免“信息不足”卡片
  community_sources:
    lookback_hours: 96
    lobsters:
      enabled: true
      url: https://lobste.rs/t/ai.json
      max_fetch: 25
      min_score: 5
      min_comments: 2
    stackexchange:
      enabled: true
      max_fetch_per_site: 20
      sites:
        - {site: genai, name: GenAI Stack Exchange}
        - {site: ai, name: AI Stack Exchange}
  last30days:
    enabled: true
    english:
      enabled: true
      topic: "LLM OR GPT OR Claude OR Gemini OR DeepSeek"
      sources: [reddit, x, youtube, bluesky]
      lookback_days: 2
      timeout_seconds: 150
      max_results: 16
      max_per_source: 8
    chinese:
      enabled: true
      topic: "大模型 人工智能 AI 智能体"
      sources: [weibo, bilibili, zhihu, baidu, toutiao]
      lookback_days: 2
      timeout_seconds: 150
      request_timeout_seconds: 20
  official_updates:
    enabled: true
    lookback_hours: 168
    max_staleness_hours: 240
    content_fetch_limit: 4
    sites:
      - name: Anthropic Newsroom
        parser: anthropic
        url: https://www.anthropic.com/news
        fetch_content: true
        max_items: 8
      - name: DeepSeek Official
        parser: deepseek
        url: https://www.deepseek.com/en/transparency/
        fetch_content: false
        max_items: 4
      - name: Qwen Code Blog
        parser: qwen
        url: https://qwenlm.github.io/qwen-code-docs/en/blog/
        fetch_content: true
        max_items: 6
      - name: Kimi Research
        parser: kimi
        url: https://www.kimi.com/en/blog/
        fetch_content: true
        max_items: 6
