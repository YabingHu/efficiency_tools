name: AI Daily Digest

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-daily-digest-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    defaults:
      run:
        working-directory: ai-daily-digest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-daily-digest/requirements.lock

      - name: Install dependencies
        run: python -m pip install --requirement requirements.lock

      - name: Fetch pinned community source engines
        shell: bash
        run: |
          mkdir -p .external-skills/last30days-en .external-skills/last30days-cn

          git -C .external-skills/last30days-en init
          git -C .external-skills/last30days-en remote add origin https://github.com/mvanhorn/last30days-skill.git
          git -C .external-skills/last30days-en fetch --depth 1 origin 249c7a4c040558a903d6838dee31012980d4946d
          git -C .external-skills/last30days-en checkout --detach FETCH_HEAD

          git -C .external-skills/last30days-cn init
          git -C .external-skills/last30days-cn remote add origin https://github.com/Jesseovo/last30days-skill-cn.git
          git -C .external-skills/last30days-cn fetch --depth 1 origin a2149277b73140434a5711f007d2dcdbe5a3be86
          git -C .external-skills/last30days-cn checkout --detach FETCH_HEAD

      - name: Find previous history artifact
        id: previous-history
        uses: actions/github-script@v9
        with:
          result-encoding: string
          script: |
            const response = await github.rest.actions.listArtifactsForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              name: "digest-history",
              per_page: 100,
            });
            const artifact = response.data.artifacts.find(item => !item.expired);
            return artifact?.workflow_run?.id?.toString() ?? "";

      - name: Restore previous history
        if: steps.previous-history.outputs.result != ''
        uses: actions/download-artifact@v8
        with:
          name: digest-history
          path: ai-daily-digest/history
          github-token: ${{ github.token }}
          run-id: ${{ steps.previous-history.outputs.result }}

      - name: Check required secret
        shell: bash
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [[ -z "$LLM_API_KEY" ]]; then
            echo "::error::Missing repository secret LLM_API_KEY"
            exit 1
          fi

      - name: Generate daily digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
          LAST30DAYS_EN_SKILL_DIR: ${{ github.workspace }}/ai-daily-digest/.external-skills/last30days-en/skills/last30days
          LAST30DAYS_CN_SKILL_DIR: ${{ github.workspace }}/ai-daily-digest/.external-skills/last30days-cn/skills/last30days
          XAI_API_KEY: ${{ secrets.XAI_API_KEY }}
          XQUIK_API_KEY: ${{ secrets.XQUIK_API_KEY }}
          BLUESKY_HANDLE: ${{ secrets.BLUESKY_HANDLE }}
          BLUESKY_APP_PASSWORD: ${{ secrets.BLUESKY_APP_PASSWORD }}
          SCRAPECREATORS_API_KEY: ${{ secrets.SCRAPECREATORS_API_KEY }}
        run: python -m src.main

      - name: Build 31-day history
        run: python -m src.history --retention-days 31

      - name: Save history for the next run
        uses: actions/upload-artifact@v7
        with:
          name: digest-history
          path: ai-daily-digest/history
          if-no-files-found: error
          retention-days: 31

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ai-daily-digest/output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
