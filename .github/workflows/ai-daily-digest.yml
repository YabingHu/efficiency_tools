name: AI Daily Digest

on:
  schedule:
    - cron: "0 8 * * *"
      timezone: Asia/Shanghai
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: ai-daily-digest-pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ai-daily-digest

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: ai-daily-digest/requirements.lock

      - name: Install dependencies
        run: python -m pip install --requirement requirements.lock

      - name: Check required secret
        shell: bash
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: |
          if [[ -z "$LLM_API_KEY" ]]; then
            echo "::error::Missing repository secret LLM_API_KEY"
            exit 1
          fi

      - name: Generate daily digest
        env:
          LLM_API_KEY: ${{ secrets.LLM_API_KEY }}
        run: python -m src.main

      - name: Configure GitHub Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ai-daily-digest/output

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
